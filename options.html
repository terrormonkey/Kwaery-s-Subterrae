<!DOCTYPE html>
<html>

<head>
  <title>Kwaery's Subterrae — Settings</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      padding: 24px;
      width: 340px;
      background-color: #000;
      color: #e8e8e8;
      -webkit-font-smoothing: antialiased;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fff;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .section {
      margin-bottom: 20px;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .section:last-of-type {
      border-bottom: none;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    /* ── Custom Radio Buttons ── */
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.55);
      transition: background-color 0.25s cubic-bezier(0.4, 0, 0.2, 1),
        color 0.25s ease;
    }

    .radio-label:hover {
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.75);
    }

    .radio-label input[type="radio"] {
      display: none;
    }

    .radio-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.15);
      position: relative;
      flex-shrink: 0;
      transition: border-color 0.3s ease;
    }

    .radio-dot::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: #fff;
      transform: scale(0);
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .radio-label input[type="radio"]:checked~.radio-dot {
      border-color: rgba(255, 255, 255, 0.5);
    }

    .radio-label input[type="radio"]:checked~.radio-dot::after {
      transform: scale(1);
    }

    .radio-label:has(input[type="radio"]:checked) {
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      font-weight: 600;
    }

    /* Put radio-dot before the text visually */
    .radio-label {
      flex-direction: row-reverse;
      justify-content: flex-end;
    }

    /* ── Shortcuts Card ── */
    .shortcuts-list {
      background: #0a0a0a;
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 12px 14px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .shortcut-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .shortcut-action {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 500;
    }

    .shortcut-keys {
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      background: rgba(255, 255, 255, 0.06);
      padding: 3px 8px;
      border-radius: 5px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-family: 'SF Mono', 'Consolas', 'Menlo', monospace;
      letter-spacing: 0.02em;
    }

    /* ── Save Button ── */
    #save {
      width: 100%;
      padding: 11px 0;
      background: transparent;
      color: #fff;
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1),
        border-color 0.3s cubic-bezier(0.4, 0, 0.2, 1),
        transform 0.15s ease;
    }

    #save:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.25);
    }

    #save:active {
      transform: scale(0.98);
      background: rgba(255, 255, 255, 0.1);
    }

    /* ── Status Message ── */
    .status {
      margin-top: 12px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1),
        transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .status.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>
  <h2>Settings</h2>

  <div class="section">
    <div class="section-title">Theme</div>
    <div class="radio-group" id="theme-group">
      <!-- Generated by JS -->
    </div>
  </div>

  <div class="section">
    <div class="section-title">Shortcuts</div>
    <div class="shortcuts-list">
      <div class="shortcut-item">
        <span class="shortcut-action">Toggle Dark Mode</span>
        <span class="shortcut-keys">Shift + X</span>
      </div>
      <div class="shortcut-item">
        <span class="shortcut-action">Open Dimmer</span>
        <span class="shortcut-keys">Shift + Y</span>
      </div>
      <div class="shortcut-item">
        <span class="shortcut-action">Open Tutorial</span>
        <span class="shortcut-keys">Shift + T</span>
      </div>
      <div class="shortcut-item">
        <span class="shortcut-action">Cycle Theme</span>
        <span class="shortcut-keys">Shift + &lt;</span>
      </div>
    </div>
  </div>

  <button id="save">Save</button>
  <div id="status" class="status">Options saved.</div>

  <script src="themes.js"></script>
  <script src="options.js"></script>
</body>

</html>
